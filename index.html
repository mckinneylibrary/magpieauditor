<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project MAGPIE: Series Gap Auditor</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; color: #333; padding: 30px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { color: #0056b3; margin-top: 0; }
        .upload-section { border: 2px dashed #ccc; padding: 30px; text-align: center; border-radius: 6px; margin-bottom: 25px; background: #fafafa; }
        .upload-section input[type="text"] { width: 80%; padding: 10px; font-size: 14px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #004494; }
        .dashboard { display: none; }
        .series-card { border: 1px solid #eee; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .series-header { font-size: 1.2em; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .koha-list, .ol-list { background: #fdfdfd; padding: 15px; border-radius: 4px; border: 1px solid #f0f0f0; }
        .koha-list h3 { color: #2e7d32; margin-top: 0; }
        .ol-list h3 { color: #c62828; margin-top: 0; }
        .owned-item { padding: 5px 0; border-bottom: 1px solid #eee; font-size: 0.9em; }
        .missing-item { padding: 5px 0; border-bottom: 1px solid #eee; font-size: 0.9em; color: #c62828; font-weight: bold; }
        .loading { color: #666; font-style: italic; }
        .error-text { color: red; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Series Gap Auditor</h1>
    <p>Enter your Koha Public JSON Report URL to analyze series holdings against the Open Library database.</p>

    <div class="upload-section" id="upload-box">
        <input type="text" id="json-url" placeholder="https://mckinney.bywatersolutions.com/cgi-bin/koha/svc/report?id=1162">
        <br>
        <button onclick="fetchKohaData()">Run Live Audit</button>
        <div id="error-message" class="error-text"></div>
    </div>

    <div class="dashboard" id="dashboard">
        <h2>Audit Results</h2>
        <div id="results-container"></div>
    </div>
</div>

<script>
    async function fetchKohaData() {
        const urlInput = document.getElementById('json-url').value.trim();
        const errorDiv = document.getElementById('error-message');
        errorDiv.innerText = '';

        if (!urlInput) {
            errorDiv.innerText = 'Please enter a valid Koha JSON URL.';
            return;
        }

        try {
            // Because Koha servers sometimes block browser requests (CORS), 
            // we route the fetch through a free, open proxy to guarantee the data loads.
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(urlInput)}`;
            
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('Network response was not OK');
            
            const proxyData = await response.json();
            
            // The proxy returns the JSON as a string inside the 'contents' property
            const data = JSON.parse(proxyData.contents);
            
            // Check if Koha returned an array of data
            if (!Array.isArray(data)) {
                throw new Error("The URL did not return a valid JSON array.");
            }

            // Group the Koha data by series_name
            const seriesGroups = {};
            data.forEach(book => {
                const sName = book.series_name; // Assuming your SQL column is named this
                if (sName) {
                    if (!seriesGroups[sName]) seriesGroups[sName] = [];
                    seriesGroups[sName].push(book);
                }
            });

            document.getElementById('upload-box').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            await renderDashboard(seriesGroups);

        } catch (error) {
            console.error(error);
            errorDiv.innerText = `Failed to load data. Make sure the URL is correct and the report is public. Error: ${error.message}`;
        }
    }

    async function renderDashboard(seriesGroups) {
        const container = document.getElementById('results-container');
        container.innerHTML = '';

        for (const [seriesName, books] of Object.entries(seriesGroups)) {
            // Sort Koha books by volume number
            books.sort((a, b) => {
                const volA = parseInt(a.volume_number) || 999;
                const volB = parseInt(b.volume_number) || 999;
                return volA - volB;
            });

            const card = document.createElement('div');
            card.className = 'series-card';
            
            let kohaHtml = books.map(b => `<div class="owned-item">Vol ${b.volume_number || '?'}: ${b.title}</div>`).join('');

            card.innerHTML = `
                <div class="series-header">
                    <span>Series: ${seriesName}</span>
                    <button onclick="auditAgainstOpenLibrary('${seriesName.replace(/'/g, "\\'")}', this.closest('.series-card'))">Check for Gaps</button>
                </div>
                <div class="comparison-grid">
                    <div class="koha-list">
                        <h3>Owned in Koha (${books.length})</h3>
                        ${kohaHtml}
                    </div>
                    <div class="ol-list">
                        <p class="loading">Click 'Check for Gaps' to query Open Library...</p>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }
    }

    async function auditAgainstOpenLibrary(seriesName, cardElement) {
        const olContainer = cardElement.querySelector('.ol-list');
        olContainer.innerHTML = `<p class="loading">Searching Open Library API for "${seriesName}"...</p>`;

        try {
            const response = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(seriesName)}`);
            const data = await response.json();

            if (data.docs && data.docs.length > 0) {
                let olBooks = data.docs.filter(b => b.title.toLowerCase().includes(seriesName.toLowerCase()) || (b.series && b.series.some(s => s.toLowerCase().includes(seriesName.toLowerCase()))));
                
                if (olBooks.length === 0) {
                     olBooks = data.docs.slice(0, 10); 
                }

                let html = `<h3>Found in Open Library</h3>`;
                olBooks.forEach(book => {
                    html += `<div class="missing-item">Title: ${book.title} ${book.first_publish_year ? '('+book.first_publish_year+')' : ''}</div>`;
                });
                
                html += `<p style="font-size: 0.8em; color: #666; margin-top: 15px;">*Note: Open Library series data is crowdsourced. Verify missing titles before purchasing.</p>`;
                olContainer.innerHTML = html;
            } else {
                olContainer.innerHTML = `<p>No records found in Open Library for this series.</p>`;
            }
        } catch (error) {
            olContainer.innerHTML = `<p style="color:red;">Error connecting to Open Library API.</p>`;
        }
    }
</script>

</body>
</html>
